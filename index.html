<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đi chơi với anh nhé ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cursor"></div>

<div class="container">

<h1>Em có đồng ý đi chơi với anh không? ❤️</h1>

<div class="buttons">
<button id="yes">YES 💖</button>

</div>

<div id="result" class="hidden">

<img src="images/couple.jpg" class="photo">

<h2>📅 Ngày đi chơi</h2>

<input type="date" value="2026-07-25">

<h2>📍 Em muốn ăn gì?</h2>

<div class="food-grid">

<div class="food">🍝 Đồ Âu</div>
<div class="food">🍜 Đồ Hàn</div>
<div class="food">🍣 Đồ Nhật</div>
<div class="food">🍲 Đồ Việt</div>
<div class="food">🌶️ Đồ Thái</div>

</div>

<p id="message"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
