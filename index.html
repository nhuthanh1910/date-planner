<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đi date với anh nha ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(-45deg,#ff9ecf,#ffd6e8,#ffc6ff,#ffe5ec);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0 50%;}
50%{background-position:100% 50%;}
100%{background-position:0 50%;}
}

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:.5s;
}

.hidden{
display:none;
}

h1{
font-size:45px;
text-shadow:0 5px 15px rgba(0,0,0,.2);
margin-bottom:25px;
}

button{
padding:15px 40px;
border:none;
border-radius:40px;
font-size:22px;
cursor:pointer;
margin:10px;
transition:.3s;
}

.yes{
background:#ff4f8b;
color:white;
}

.no{
background:white;
color:#ff4f8b;
}

button:hover{
transform:scale(1.08);
}

/* 3D Heart */

.heart{
width:140px;
height:140px;
background:red;
position:relative;
transform:rotate(-45deg);
animation:beat 1s infinite;
box-shadow:0 20px 40px rgba(255,0,80,.5);
margin-bottom:40px;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:140px;
height:140px;
background:red;
border-radius:50%;
}

.heart:before{
top:-70px;
left:0;
}

.heart:after{
left:70px;
top:0;
}

@keyframes beat{
50%{
transform:rotate(-45deg) scale(1.08);
}
}

/* Sakura */

.petal{
position:absolute;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:.3;
}
}

.calendar{
background:white;
color:#444;
padding:20px;
border-radius:20px;
}

.calendar h2{
text-align:center;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,60px);
gap:8px;
}

.day{
height:60px;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
cursor:pointer;
background:#f2f2f2;
transition:.2s;
}

.day:hover{
background:#ff8ab5;
color:white;
}

.selected{
background:#ff4f8b!important;
color:white;
}

.food-grid{
display:grid;
grid-template-columns:repeat(4,180px);
gap:15px;
margin-top:25px;
}

.food{
background:white;
color:#444;
padding:18px;
border-radius:15px;
cursor:pointer;
text-align:center;
transition:.3s;
}

.food:hover{
background:#ff6aa5;
color:white;
transform:scale(1.05);
}

#message{
font-size:32px;
margin-top:25px;
font-weight:bold;
}

#confirm{
text-align:center;
}

#confirm h2{
font-size:42px;
margin-bottom:20px;
}
</style>

</head>
<body>

<div id="cursor"></div>

<div id="home" class="page">

<div class="heart"></div>

<h1>Em đi date với Anh nha? ❤️</h1>

<div>
<button class="yes" onclick="openCalendar()">YES</button>
<button class="no">NO 😢</button>
</div>

</div>

<div id="calendarPage" class="page hidden">

<div class="calendar">

<h2>📅 Em chọn ngày đi chơi ik</h2>

<div class="grid" id="days"></div>

</div>

</div>

<div id="foodPage" class="page hidden">

<h2>📍 Chàng trai của anh muốn ăn gì nào?</h2>

<div class="food-grid">

<div class="food">🇰🇷 Đồ Hàn</div>
<div class="food">🇪🇺 Đồ Âu</div>
<div class="food">🇻🇳 Đồ Việt</div>
<div class="food">🇹🇭 Đồ Thái</div>
<div class="food">🇯🇵 Đồ Nhật</div>
<div class="food">🇮🇳 Đồ Ấn</div>
<div class="food">🇲🇾 Đồ Malay</div>
<div class="food">🇰🇭 Đồ Campuchia</div>

</div>

<div id="message">
I love emmmm ❤️
</div>

<br>

<button class="yes" onclick="finish()">Xác nhận</button>

</div>

<div id="confirm" class="page hidden">

<h2>🎉 Lịch date đã được xác nhận</h2>

<h1 id="result"></h1>

<h2>⏰ Thời gian: 14:00</h2>

<p style="font-size:30px;">❤️ Bông biêng rất vui vì em đã đồng ý đi date ❤️</p>

</div>

<script>

for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=5+Math.random()*5+"s";
p.style.fontSize=15+Math.random()*20+"px";
document.body.appendChild(p);
}

let cursor=document.createElement("div");
cursor.style.position="fixed";
cursor.style.width="18px";
cursor.style.height="18px";
cursor.style.borderRadius="50%";
cursor.style.background="#fff";
cursor.style.pointerEvents="none";
cursor.style.boxShadow="0 0 20px white,0 0 40px pink";
cursor.style.transform="translate(-50%,-50%)";
document.body.appendChild(cursor);

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

const days=document.getElementById("days");

let selectedDate="";

for(let i=1;i<=31;i++){

let d=document.createElement("div");

d.className="day";

d.innerHTML=i;

d.onclick=()=>{

document.querySelectorAll(".day").forEach(x=>x.classList.remove("selected"));

d.classList.add("selected");

selectedDate=i+"/07/2026";

setTimeout(()=>{

document.getElementById("calendarPage").classList.add("hidden");
document.getElementById("foodPage").classList.remove("hidden");

},500);

}

days.appendChild(d);

}

function openCalendar(){

home.classList.add("hidden");

calendarPage.classList.remove("hidden");

}

function finish(){

foodPage.classList.add("hidden");

confirm.classList.remove("hidden");

document.getElementById("result").innerHTML=
"📅 "+selectedDate+"<br><br>🍽️ Địa điểm ăn đã chọn";

}

</script>

</body>
</html>
